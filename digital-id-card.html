<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Your Digital ID Card</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Check-In">
<link rel="manifest" href="https://young-life-australia.github.io/digital-id/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="https://young-life-australia.github.io/digital-id/apple-touch-icon.png">
<meta name="theme-color" content="#1a1a2e">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,700;1,9..40,900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --card-bg: #ffffff;
    --card-border: #e2e0dc;
    --accent: #1a1a2e;
    --accent-light: #3a3a5e;
    --text-primary: #1a1a2e;
    --text-secondary: #6b6b80;
    --surface: #f4f3f0;
    --highlight: #c9a84c;
    --highlight-soft: #f5edda;
    --radius: 20px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* ---- subtle background texture ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,.035) 1px, transparent 0);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ---- the card ---- */
  .card {
    width: 100%;
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--card-border);
    overflow: hidden;
    box-shadow:
      0 1px 2px rgba(0,0,0,.04),
      0 4px 12px rgba(0,0,0,.06),
      0 20px 40px rgba(0,0,0,.06);
    animation: card-in .6s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header {
    background: var(--accent);
    padding: 28px 28px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  /* decorative corner arc */
  .card-header::after {
    content: '';
    position: absolute;
    right: -40px;
    top: -40px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 24px solid rgba(255,255,255,.04);
    pointer-events: none;
  }

  .org-logo {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    object-fit: contain;
    background: #fff;
    padding: 4px;
    flex-shrink: 0;
  }

  .org-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .org-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: #fff;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .org-subtitle {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,.55);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .card-body {
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .person-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 900;
    text-align: center;
    line-height: 1.25;
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .person-name .name-line {
    display: block;
  }

  .hero-logo {
    width: 260px;
    max-width: 85%;
    height: auto;
    object-fit: contain;
  }

  .hero-tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.01em;
    color: var(--text-primary);
    text-align: center;
    margin-top: -8px;
  }

  .qr-wrapper {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-wrapper canvas {
    display: block !important;
    border-radius: 4px;
  }
  .qr-wrapper img {
    display: none !important;
  }

  .security-id {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: .03em;
  }
  .security-id .label {
    font-weight: 300;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: .06em;
  }
  .security-id .value {
    color: var(--text-primary);
    font-weight: 700;
    font-family: 'DM Sans', monospace;
  }

  .card-footer {
    border-top: 1px solid var(--card-border);
    padding: 14px 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .card-footer svg {
    width: 14px;
    height: 14px;
    opacity: .45;
  }

  /* ---- error state ---- */
  .error-state {
    text-align: center;
    padding: 60px 24px;
  }
  .error-state h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    margin-bottom: 12px;
  }
  .error-state p {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 300px;
    margin: 0 auto;
  }


  /* hide QR temp container */
  #qr-temp { position: absolute; left: -9999px; top: -9999px; }
</style>
</head>
<body>

<div class="page-wrapper" id="page-wrapper">
  <!-- Content is injected by JS -->
</div>
<div id="qr-temp"></div>
